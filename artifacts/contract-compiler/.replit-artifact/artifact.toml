kind = "web"
previewPath = "/"
title = "Contract Compiler"
version = "1.0.0"
id = "artifacts/contract-compiler"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20987
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/contract-compiler run dev"

[services.env]
PORT = "20987"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/contract-compiler", "run", "build"]
publicDir = "artifacts/contract-compiler/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
